services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vpn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vpn}
      POSTGRES_DB: ${POSTGRES_DB:-vpn_bot}
    volumes:
      - vpn_bot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vpn} -d ${POSTGRES_DB:-vpn_bot}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  bot:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-vpn}:${POSTGRES_PASSWORD:-vpn}@db:5432/${POSTGRES_DB:-vpn_bot}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - /proc/stat:/host/proc/stat:ro
      - /proc/meminfo:/host/proc/meminfo:ro
      - /proc/uptime:/host/proc/uptime:ro
      - /proc/net/dev:/host/proc/net/dev:ro
      - /proc/net/tcp:/host/proc/net/tcp:ro
      - /proc/net/tcp6:/host/proc/net/tcp6:ro

networks:
  internal:

volumes:
  vpn_bot_pgdata:
